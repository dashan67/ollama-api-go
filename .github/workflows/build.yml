name: Build Go Executables

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22.x'

    - name: Init Go Module
      run: |
        test -f go.mod || go mod init ollama-proxy
        go mod tidy

    - name: Build for Windows 11 (AMD64)
      env:
        GOOS: windows
        GOARCH: amd64
      run: |
        mkdir -p build/windows
        go build -o build/windows/ollama-proxy.exe main.go

    # 真正的安卓目标编译方案！
    - name: Build for Termux (Android 9, 32-bit ARM)
      env:
        GOOS: android
        GOARCH: arm
        GOARM: 7
        CGO_ENABLED: 1 # 必须开启 CGO
      run: |
        mkdir -p build/termux
        # 利用 GitHub Actions 预装的 Android NDK 路径 ($ANDROID_NDK_HOME)
        # Android 9 的底层对应的是 API Level 28，调用对应的 clang 编译器
        export CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi28-clang
        # 执行编译
        go build -o build/termux/ollama-proxy main.go

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-11-AMD64-exe
        path: build/windows/ollama-proxy.exe

    - name: Upload Termux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Termux-Android9-ARM32
        path: build/termux/ollama-proxy
