name: Build Go Executables

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22.x'

    # 这次 if 后面绝对加上空格了！！！
    - name: Init Go Module
      run: |
        if[ ! -f go.mod ]; then
          go mod init ollama-proxy
        fi
        go mod tidy

    - name: Build for Windows 11 (AMD64)
      env:
        GOOS: windows
        GOARCH: amd64
      run: |
        mkdir -p build/windows
        go build -o build/windows/ollama-proxy.exe main.go

    - name: Build for Termux (32-bit ARM)
      env:
        GOOS: linux
        GOARCH: arm
        GOARM: 7
      run: |
        mkdir -p build/termux
        go build -o build/termux/ollama-proxy main.go

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-11-AMD64-exe
        path: build/windows/ollama-proxy.exe

    - name: Upload Termux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Termux-Android9-ARM32
        path: build/termux/ollama-proxy
